version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: research-scholar-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: research_scholar_agent
    networks:
      - research-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: research-scholar-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/research_scholar_agent
      - JWT_SECRET=your-production-jwt-secret-change-this
      - JWT_EXPIRE=7d
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
      - ai-service
    networks:
      - research-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: research-scholar-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    networks:
      - research-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: research-scholar-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - research-network

networks:
  research-network:
    driver: bridge

volumes:
  mongodb_data:
